<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }

    .card {
      background: rgba(0, 0, 0, 0.4);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      max-width: 420px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #fff;
      color: #ff4b5c;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ffe3e8;
    }

    .hidden {
      display: none;
      margin-top: 15px;
      font-size: 20px;
      color: #ffeb3b;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>I Love You ❤️</h1>
    <p>Hey my love,</p>
    <p>You are the most beautiful person I have ever seen, not just outside but from your heart.</p>
    <p>Your smile makes my day brighter, your eyes shine like stars, and your presence makes everything feel perfect.</p>
    <p>I’m really lucky to have you in my life 💖</p>

    <button onclick="showLove()">Tap here ❤️</button>
    <p id="loveMsg" class="hidden">Forever yours 💍❤️</p>
  </div>

  <script>
    function showLove() {
      document.getElementById("loveMsg").style.display = "block";
    }
  </script>

</body>
</html>
