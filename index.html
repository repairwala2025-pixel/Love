<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Sorry</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      color: #333;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 400px;
    }

    h1 {
      color: #ff4b5c;
    }

    p {
      font-size: 18px;
      margin: 15px 0;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #ff4b5c;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #ff1e3c;
    }

    .hidden {
      display: none;
      margin-top: 15px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>I'm Really Sorry 😔</h1>
    <p>Hey my friend,</p>
    <p>I didn't mean to hurt you. You mean a lot to me and I truly regret what I did.</p>
    <p>Please forgive me ❤️</p>

    <button onclick="showMessage()">Forgive Me?</button>
    <p id="reply" class="hidden">Thank you for forgiving me! 😊</p>
  </div>

  <script>
    function showMessage() {
      document.getElementById("reply").style.display = "block";
    }
  </script>

</body>
</html>
